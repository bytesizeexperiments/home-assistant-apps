name: "Homepage"
slug: "homepage"
description: "The highly customizable dashboard for your homelab."
version: "1.10.1"
url: "https://github.com/gethomepage/homepage"
maintainer: "Byte Size Experiments"

arch:
  - aarch64
  - amd64

startup: application
boot: auto

# Homepage does NOT support subpath routing → no ingress
ingress: false

# Homepage listens on port 3000 internally
ports:
  3000/tcp: 3000

# Persist configuration
map:
  - addon_config:rw

# Allow Homepage to auto-discover Docker containers
docker_api: true

schema: {}
